<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lion X Taxi — Gdańsk</title>
<meta name="description" content="Lion X Taxi Gdańsk — komfortowe przejazdy po Trójmieście i nie tylko.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- ── PRZEŁĄCZNIK JĘZYKA ── -->
<div id="lang-switcher">
  <button id="lang-current" onclick="toggleLangDropdown()"></button>
  <div id="lang-dropdown">
    <div id="lang-list"></div>
  </div>
</div>

<div class="screen">

  <!-- ── LEWA KOLUMNA ── -->
  <div class="col-left">

    <div class="logo">
      <img src="assets/img/logo-lion.png" alt="Lion X" class="logo-img">
      <span class="logo-text">LION<span class="gold">X</span></span>
    </div>

    <!-- Formularz rezerwacji -->
    <div class="booking-form">
      <p class="booking-label" data-i18n="tagline">Zamów przejazd</p>
      <div class="booking-title">
        <span class="white" data-i18n="hero_title_1">Zamów</span>
        <span class="accent" data-i18n="hero_title_2">Przejazd</span>
      </div>
      <div class="bf-row">
        <div class="bf-field">
          <label data-i18n="label_from">Skąd</label>
          <div class="ac-wrap">
            <input type="text" id="bf-from" data-i18n-placeholder="placeholder_from" placeholder="Miasto wyjazdu" autocomplete="off">
            <div class="ac-list" id="ac-bf-from"></div>
          </div>
        </div>
        <div class="bf-field">
          <label data-i18n="label_to">Dokąd</label>
          <div class="ac-wrap">
            <input type="text" id="bf-to" data-i18n-placeholder="placeholder_to" placeholder="Miasto docelowe" autocomplete="off">
            <div class="ac-list" id="ac-bf-to"></div>
          </div>
        </div>
      </div>

      <div class="bf-row">
        <div class="bf-field">
          <label data-i18n="label_persons">Liczba osób</label>
          <select id="bf-persons">
            <option value="1">1 osoba</option>
            <option value="2">2 osoby</option>
            <option value="3">3 osoby</option>
            <option value="4">4 osoby</option>
            <option value="5">5 osób</option>
            <option value="6">6 osób</option>
            <option value="7">7 osób</option>
            <option value="8">8 osób</option>
          </select>
        </div>
        <div class="bf-field">
          <label data-i18n="label_date">Data</label>
          <input type="date" id="bf-date">
        </div>
        <div class="bf-field">
          <label data-i18n="label_time">Godzina</label>
          <input type="time" id="bf-time">
        </div>
      </div>

      <button class="btn-book" onclick="submitBooking()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.13 12.1 19.79 19.79 0 0 1 1.06 3.47 2 2 0 0 1 3.05 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
        <span data-i18n="btn_book">Zamów przejazd</span>
      </button>
    </div>

    <!-- Zdjęcie (ukryte) -->
    <img src="assets/img/hero-cars.png" alt="Lion X Taxi" class="hero-img hidden">

    <div class="contact-bar">
      <a href="tel:+48698018895" class="contact-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.13 12.1 19.79 19.79 0 0 1 1.06 3.47 2 2 0 0 1 3.05 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
        698 018 895
      </a>
      <span class="contact-sep">·</span>
      <a href="tel:+48676767676" class="contact-link">676 767 676</a>
    </div>

  </div>

  <!-- ── PRAWA KOLUMNA ── -->
  <div class="col-right">

    <button class="nav-tile" onclick="openPanel('uslugi')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10V3.5C10 2.67 9.33 2 8.5 2S7 2.67 7 3.5 7.67 5 8.5 5z"/></svg>
      <span data-i18n="nav_services">USŁUGI</span>
      <svg class="arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <button class="nav-tile" onclick="openPanel('cennik')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span data-i18n="nav_pricing">CENNIK</span>
      <svg class="arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <button class="nav-tile" onclick="openPanel('wycieczki')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span data-i18n="nav_trips">WYCIECZKI</span>
      <svg class="arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <button class="nav-tile" onclick="openPanel('kontakt')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.13 12.1 19.79 19.79 0 0 1 1.06 3.47 2 2 0 0 1 3.05 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
      <span data-i18n="nav_contact">KONTAKT</span>
      <svg class="arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

  </div>

</div>

<!-- ── PANELE ── -->
<div class="panel" id="panel-uslugi">
  <div class="panel-inner">
    <button class="panel-close" onclick="closePanel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 class="panel-title" data-i18n="services_title">Usługi</h2>
    <div class="panel-content" id="content-uslugi"></div>
  </div>
</div>

<div class="panel" id="panel-cennik">
  <div class="panel-inner">
    <button class="panel-close" onclick="closePanel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 class="panel-title" data-i18n="pricing_title">Cennik</h2>
    <div class="panel-content" id="content-cennik"></div>
  </div>
</div>

<div class="panel" id="panel-wycieczki">
  <div class="panel-inner">
    <button class="panel-close" onclick="closePanel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 class="panel-title" data-i18n="trips_title">Wycieczki</h2>
    <div class="panel-content" id="content-wycieczki"></div>
  </div>
</div>

<div class="panel" id="panel-kontakt">
  <div class="panel-inner">
    <button class="panel-close" onclick="closePanel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2 class="panel-title" data-i18n="contact_title">Kontakt</h2>
    <div class="panel-content" id="content-kontakt"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- Modal potwierdzenia rezerwacji -->
<div class="booking-modal" id="booking-modal">
  <div class="booking-modal-box">
    <h3 data-i18n="modal_title">Gotowe! Zadzwoń i potwierdź</h3>
    <p id="booking-summary"></p>
    <div class="booking-modal-phones">
      <a href="tel:+48698018895">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.13 12.1 19.79 19.79 0 0 1 1.06 3.47 2 2 0 0 1 3.05 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
        698 018 895
      </a>
      <a href="tel:+48676767676">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.13 12.1 19.79 19.79 0 0 1 1.06 3.47 2 2 0 0 1 3.05 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
        676 767 676
      </a>
    </div>
    <button class="booking-modal-close" onclick="closeBookingModal()" data-i18n="modal_close">Zamknij</button>
  </div>
</div>

<script src="assets/js/cities.js"></script>
<script src="assets/js/calculator.js"></script>
<script src="assets/js/translations.js"></script>
<script src="assets/js/lang.js"></script>
<script src="assets/js/panel-uslugi.js"></script>
<script src="assets/js/panel-cennik.js"></script>
<script src="assets/js/panel-wycieczki.js"></script>
<script src="assets/js/panel-kontakt.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
